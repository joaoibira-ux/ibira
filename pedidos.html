<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pedidos" />
  <title>IBIRÁ - Pedidos</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css?v=29" />
</head>
<body>

<header>
  <a class="btn-voltar-header" href="./menu.html">← Menu</a>
  <span class="titulo">Pedidos</span>
  <span id="versao-app" class="header-versao"></span>
</header>

<div id="lista" class="lista"></div>
<button class="fab" id="fab" onclick="abrirFormulario()">+</button>

<div id="form-overlay" class="form-overlay" style="display:none">
  <div class="form-scroll">
    <form id="form" novalidate>
      <div class="form-row">
        <div class="form-group full">
          <label>Cliente *</label>
          <select id="f-cliente"></select>
        </div>
      </div>

      <div id="itens-container"></div>
      <button type="button" class="btn-add-item" onclick="adicionarItem()">+ Adicionar item</button>
      <div class="form-total" id="form-total">Total: R$ 0,00</div>

      <div class="form-row">
        <div class="form-group full">
          <label>Observações</label>
          <textarea id="f-obs" rows="2" placeholder="Opcional"></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" onclick="fecharFormulario()">Cancelar</button>
        <button type="button" class="btn-save" onclick="salvarPedido()">Salvar</button>
      </div>
    </form>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="./app.js?v=6"></script>
<script src="./pedidos.js?v=5"></script>
</body>
</html>
