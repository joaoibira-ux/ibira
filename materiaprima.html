<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Matéria-Prima" />
  <title>IBIRÁ - Matéria-Prima</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css?v=25" />
</head>
<body>

<header>
  <a class="btn-voltar-header" href="./menu.html">← Menu</a>
  <span class="titulo">Matéria-Prima</span>
  <span id="versao-app" class="header-versao"></span>
</header>

<div id="lista" class="lista"></div>
<button class="fab" id="fab" onclick="abrirFormulario()">+</button>

<div id="form-overlay" class="form-overlay" style="display:none">
  <div class="form-scroll">
    <form id="form" novalidate>
      <div class="form-row">
        <div class="form-group full">
          <label>Nome *</label>
          <input type="text" id="f-nome" placeholder="Nome do item" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>UD</label>
          <select id="f-ud">
            <option value="Kg">Kg</option>
            <option value="Gr">Gr</option>
            <option value="Ud">Ud</option>
          </select>
        </div>
        <div class="form-group">
          <label>Estoque</label>
          <input type="number" step="any" id="f-estoque" placeholder="0" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Valor (R$/UD)</label>
          <input type="text" inputmode="decimal" id="f-valor" placeholder="0,00" />
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-cancel" onclick="fecharFormulario()">Cancelar</button>
        <button type="button" class="btn-save" onclick="salvarItem()">Salvar</button>
      </div>
    </form>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="./app.js?v=3"></script>
<script src="./estoque.js?v=6" data-api="materiaprima"></script>
</body>
</html>
