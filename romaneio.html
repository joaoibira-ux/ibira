<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Romaneio" />
  <title>IBIRÁ - Romaneio</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css?v=29" />
</head>
<body>

<header>
  <a class="btn-voltar-header" href="./menu.html">← Menu</a>
  <span class="titulo">Romaneio</span>
  <span id="versao-app" class="header-versao"></span>
</header>

<div id="lista" class="lista"></div>
<button class="fab" id="fab" onclick="abrirFormulario()">+</button>

<!-- Novo romaneio -->
<div id="form-overlay" class="form-overlay" style="display:none">
  <div class="form-scroll">
    <form id="form" novalidate>
      <div class="form-row">
        <div class="form-group full">
          <label>Veículo / Motorista *</label>
          <input type="text" id="f-veiculo" placeholder="Ex: Fiorino - João" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group full">
          <label>Data</label>
          <input type="date" id="f-data" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group full">
          <label>Observações</label>
          <textarea id="f-obs" rows="2" placeholder="Opcional"></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-cancel" onclick="fecharFormulario()">Cancelar</button>
        <button type="button" class="btn-save" onclick="salvarRomaneio()">Salvar e adicionar pedidos</button>
      </div>
    </form>
  </div>
</div>

<!-- Detalhe do romaneio -->
<div id="detalhe-overlay" class="form-overlay" style="display:none">
  <div class="form-scroll">
    <div class="detalhe-header">
      <button type="button" class="btn-cancel" onclick="fecharDetalhe()">← Voltar</button>
      <button type="button" class="btn-del" onclick="excluirRomaneio()">🗑️ Excluir</button>
    </div>
    <div id="detalhe-info"></div>
    <div id="detalhe-totais"></div>
    <div id="detalhe-produtos"></div>
    <div id="detalhe-pedidos"></div>
    <button type="button" class="btn-add-item" onclick="abrirSelecaoPedidos()">+ Adicionar pedidos</button>
  </div>
</div>

<!-- Seleção de pedidos -->
<div id="selecao-overlay" class="form-overlay" style="display:none">
  <div class="form-scroll">
    <div class="detalhe-header">
      <button type="button" class="btn-cancel" onclick="fecharSelecaoPedidos()">← Voltar</button>
      <span class="titulo-selecao">Adicionar pedidos</span>
    </div>
    <div id="selecao-lista"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="./app.js?v=3"></script>
<script src="./romaneio.js?v=3"></script>
</body>
</html>
