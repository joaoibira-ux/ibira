<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Clientes" />
  <title>IBIRÁ - Clientes</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css?v=15" />
</head>
<body>

<header>
  <a class="btn-voltar-header" href="./menu.html">← Menu</a>
  <span class="titulo">Clientes</span>
  <span id="versao-app" class="header-versao"></span>
</header>

<div id="lista" class="lista"></div>
<button class="fab" id="fab" onclick="abrirFormulario()">+</button>

<div id="form-overlay" class="form-overlay" style="display:none">
  <div class="form-scroll">
    <form id="form" novalidate>
      <div class="form-row">
        <div class="form-group full">
          <label>Nome *</label>
          <input type="text" id="f-nome" placeholder="Nome do cliente" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group full">
          <label>Telefone</label>
          <input type="tel" id="f-telefone" placeholder="(00) 00000-0000" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group full">
          <label>Endereço</label>
          <input type="text" id="f-endereco" placeholder="Rua, número, bairro, cidade" />
        </div>
      </div>
      <div class="form-row">
        <button type="button" class="btn-localizacao" id="btn-localizacao" onclick="capturarLocalizacao()">📍 Capturar localização atual</button>
        <button type="button" class="btn-localizacao btn-localizacao-remover" id="btn-remover-localizacao" onclick="removerLocalizacao()" style="display:none">🗑️ Remover localização</button>
        <div class="loc-status" id="loc-status"></div>
      </div>
      <div class="form-row">
        <div class="form-group full">
          <label>Observações</label>
          <textarea id="f-obs" rows="3" placeholder="Opcional"></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-cancel" onclick="fecharFormulario()">Cancelar</button>
        <button type="button" class="btn-save" onclick="salvarCliente()">Salvar</button>
      </div>
    </form>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="./app.js?v=3"></script>
<script src="./clientes.js?v=2"></script>
</body>
</html>
