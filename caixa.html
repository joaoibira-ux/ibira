<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Caixa" />
  <title>IBIRÁ - Caixa</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css?v=16" />
</head>
<body>

<header>
  <a class="btn-voltar-header" href="./menu.html">← Menu</a>
  <span class="titulo">Caixa</span>
  <span id="versao-app" class="header-versao"></span>
</header>

<div class="saldo-card">
  <div class="saldo-label">Saldo</div>
  <div class="saldo-valor" id="saldo-valor">R$ 0,00</div>
</div>

<div id="lista" class="lista"></div>
<button class="fab" id="fab" onclick="abrirFormulario()">+</button>

<div id="form-overlay" class="form-overlay" style="display:none">
  <div class="form-scroll">
    <form id="form" novalidate>
      <h3 style="margin-bottom:12px;color:#1a3322">Novo documento</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Data</label>
          <input type="date" id="f-data" />
        </div>
        <div class="form-group">
          <label>Tipo</label>
          <select id="f-tipo">
            <option value="entrada">Entrada</option>
            <option value="saida">Saída</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group full">
          <label>Descrição</label>
          <input type="text" id="f-descricao" placeholder="Ex: Venda balcão" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group full">
          <label>Valor (R$)</label>
          <input type="text" inputmode="decimal" id="f-valor" placeholder="0,00" />
        </div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-cancel" onclick="fecharFormulario()">Cancelar</button>
        <button type="button" class="btn-save" onclick="salvarLancamento()">Salvar</button>
      </div>
    </form>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="./app.js?v=3"></script>
<script src="./caixa.js?v=1"></script>
</body>
</html>
